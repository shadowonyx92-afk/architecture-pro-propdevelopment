apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8senforcenonrootreadonly
spec:
  crd:
    spec:
      names:
        kind: K8sEnforceNonRootReadonly
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package enforcerunasnonrootreadonly

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.runAsNonRoot
          msg := sprintf("container %q must set securityContext.runAsNonRoot=true", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not container.securityContext.runAsNonRoot
          msg := sprintf("initContainer %q must set securityContext.runAsNonRoot=true", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.securityContext.readOnlyRootFilesystem
          msg := sprintf("container %q must set securityContext.readOnlyRootFilesystem=true", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not container.securityContext.readOnlyRootFilesystem
          msg := sprintf("initContainer %q must set securityContext.readOnlyRootFilesystem=true", [container.name])
        }
